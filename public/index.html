<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MimiBox</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
  header { padding: 12px 20px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 16px; font-weight: 600; color: #fff; }
  .tabs { display: flex; gap: 4px; margin-left: 16px; }
  .tab { padding: 4px 12px; font-size: 13px; border-radius: 6px; border: 1px solid #333; background: transparent; color: #888; cursor: pointer; }
  .tab.active { background: #1a1a1a; color: #fff; border-color: #444; }
  .status { font-size: 12px; color: #666; margin-left: auto; }
  .status.ready { color: #4a9; }
  .status.loading { color: #ca4; }

  #editor-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #code { flex: 1; background: #111; border: none; color: #e0e0e0; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 14px; padding: 16px 20px; resize: none; outline: none; line-height: 1.6; tab-size: 4; }
  #code::placeholder { color: #444; }

  #toolbar { padding: 8px 20px; border-top: 1px solid #222; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 8px; background: #0d0d0d; }
  #run-btn { background: #4a9; color: #000; border: none; border-radius: 6px; padding: 6px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
  #run-btn:hover { background: #5ba; }
  #run-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
  #clear-btn { background: transparent; color: #888; border: 1px solid #333; border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; }
  #clear-btn:hover { color: #ccc; border-color: #555; }
  .shortcut { font-size: 11px; color: #555; }

  #output-area { height: 40%; min-height: 100px; border-top: 1px solid #222; display: flex; flex-direction: column; }
  #output-header { padding: 8px 20px; font-size: 12px; color: #888; background: #0d0d0d; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 8px; }
  #output-header .label { text-transform: uppercase; letter-spacing: 0.5px; }
  #duration { color: #666; }
  #output { flex: 1; overflow-y: auto; padding: 16px 20px; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
  #output.error { color: #e55; }
  #output.success { color: #4a9; }
  #output .image { max-width: 100%; border-radius: 6px; margin: 8px 0; display: block; }
</style>
</head>
<body>

<header>
  <h1>MimiBox</h1>
  <div class="tabs">
    <button class="tab active" data-lang="python">Python</button>
    <button class="tab" data-lang="javascript">JavaScript</button>
  </div>
  <span id="pyodide-status" class="status loading">Pyodide loading...</span>
  <span id="quickjs-status" class="status loading">QuickJS loading...</span>
</header>

<div id="editor-area">
  <textarea id="code" placeholder="Write code here..." spellcheck="false" autofocus>print("Hello from MimiBox!")</textarea>
</div>

<div id="toolbar">
  <button id="run-btn" disabled>Run</button>
  <button id="clear-btn">Clear</button>
  <span class="shortcut">Ctrl+Enter to run</span>
</div>

<div id="output-area">
  <div id="output-header">
    <span class="label">Output</span>
    <span id="duration"></span>
  </div>
  <div id="output"></div>
</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js"></script>

<script type="module">

// ── State ─────────────────────────────────────────────────

let lang = "python";
const placeholders = {
  python: 'print("Hello from MimiBox!")',
  javascript: 'console.log("Hello from MimiBox!");',
};

// ── Pyodide ───────────────────────────────────────────────

let pyodide = null;

async function initPyodide() {
  const el = document.getElementById("pyodide-status");
  try {
    pyodide = await loadPyodide();
    await pyodide.loadPackage(["micropip"]);
    el.textContent = "Pyodide ready";
    el.className = "status ready";
    checkReady();
  } catch (e) {
    el.textContent = "Pyodide failed";
    console.error(e);
  }
}

async function runPython(code) {
  const stdout = [];
  pyodide.setStdout({ batched: (s) => stdout.push(s) });
  pyodide.setStderr({ batched: (s) => stdout.push(s) });
  try {
    const result = await pyodide.runPythonAsync(code);
    let output = stdout.join("\n");
    if (result !== undefined && result !== null && String(result) !== "None") {
      output += (output ? "\n" : "") + String(result);
    }

    let image = null;
    try {
      const hasPlot = pyodide.runPython(
        `import sys; 'matplotlib.pyplot' in sys.modules and len(__import__('matplotlib.pyplot').get_fignums()) > 0`
      );
      if (hasPlot) {
        image = pyodide.runPython(`
import matplotlib.pyplot as plt, io, base64
buf = io.BytesIO()
plt.savefig(buf, format='png', dpi=100, bbox_inches='tight')
plt.close('all')
buf.seek(0)
base64.b64encode(buf.read()).decode()
`);
      }
    } catch {}

    return { output: output || "(no output)", image };
  } catch (e) {
    return { output: stdout.join("\n"), error: e.message };
  }
}

// ── QuickJS ───────────────────────────────────────────────

let QJS = null;

async function initQuickJS() {
  const el = document.getElementById("quickjs-status");
  try {
    const mod = await import("https://esm.sh/quickjs-emscripten@0.31.0");
    QJS = await mod.getQuickJS();
    el.textContent = "QuickJS ready";
    el.className = "status ready";
    checkReady();
  } catch (e) {
    el.textContent = "QuickJS failed";
    console.error(e);
  }
}

function runJavaScript(code) {
  const runtime = QJS.newRuntime();
  runtime.setMemoryLimit(50 * 1024 * 1024);
  const vm = runtime.newContext();
  const logs = [];

  const consoleObj = vm.newObject();
  const logFn = vm.newFunction("log", (...args) => {
    logs.push(args.map((a) => vm.getString(a)).join(" "));
  });
  vm.setProp(consoleObj, "log", logFn);
  vm.setProp(consoleObj, "warn", logFn);
  vm.setProp(consoleObj, "error", logFn);
  vm.setProp(vm.global, "console", consoleObj);
  logFn.dispose();
  consoleObj.dispose();

  const result = vm.evalCode(code, "script.js");
  let output = "", error;

  if (result.error) {
    const err = vm.dump(result.error);
    error = typeof err === "object" ? err.message || JSON.stringify(err) : String(err);
    result.error.dispose();
  } else {
    const val = vm.dump(result.value);
    result.value.dispose();
    output = logs.join("\n");
    if (val !== undefined && val !== null) {
      const s = typeof val === "object" ? JSON.stringify(val, null, 2) : String(val);
      output += (output ? "\n" : "") + s;
    }
  }

  vm.dispose();
  runtime.dispose();
  return { output: output || (error ? "" : "(no output)"), error };
}

// ── UI ────────────────────────────────────────────────────

const codeEl = document.getElementById("code");
const outputEl = document.getElementById("output");
const durationEl = document.getElementById("duration");
const runBtn = document.getElementById("run-btn");
const clearBtn = document.getElementById("clear-btn");
const tabs = document.querySelectorAll(".tab");

function checkReady() {
  if ((lang === "python" && pyodide) || (lang === "javascript" && QJS)) {
    runBtn.disabled = false;
  }
}

tabs.forEach((tab) => {
  tab.addEventListener("click", () => {
    tabs.forEach((t) => t.classList.remove("active"));
    tab.classList.add("active");
    lang = tab.dataset.lang;
    codeEl.placeholder = placeholders[lang];
    if (codeEl.value === placeholders[lang === "python" ? "javascript" : "python"]) {
      codeEl.value = placeholders[lang];
    }
    checkReady();
  });
});

async function run() {
  const code = codeEl.value.trim();
  if (!code) return;

  runBtn.disabled = true;
  outputEl.textContent = "Running...";
  outputEl.className = "";
  durationEl.textContent = "";

  const start = performance.now();
  let result;

  try {
    if (lang === "python") {
      result = await runPython(code);
    } else {
      result = runJavaScript(code);
    }
  } catch (e) {
    result = { output: "", error: e.message };
  }

  const ms = Math.round(performance.now() - start);
  durationEl.textContent = `${ms}ms`;

  outputEl.textContent = "";
  if (result.error) {
    outputEl.className = "error";
    outputEl.textContent = result.error + (result.output ? "\n" + result.output : "");
  } else {
    outputEl.className = "success";
    outputEl.textContent = result.output;
  }

  if (result.image) {
    const img = document.createElement("img");
    img.className = "image";
    img.src = "data:image/png;base64," + result.image;
    outputEl.appendChild(img);
  }

  runBtn.disabled = false;
}

runBtn.addEventListener("click", run);
clearBtn.addEventListener("click", () => {
  outputEl.textContent = "";
  outputEl.className = "";
  durationEl.textContent = "";
});

codeEl.addEventListener("keydown", (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") { e.preventDefault(); run(); }
  // Tab inserts spaces
  if (e.key === "Tab") {
    e.preventDefault();
    const start = codeEl.selectionStart;
    codeEl.value = codeEl.value.substring(0, start) + "    " + codeEl.value.substring(codeEl.selectionEnd);
    codeEl.selectionStart = codeEl.selectionEnd = start + 4;
  }
});

// ── Init ──────────────────────────────────────────────────

initPyodide();
initQuickJS();

</script>
</body>
</html>
